<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Deep technical writing on Power BI, PBIR, DAX, and Microsoft Fabric by Jihwan Kim — Microsoft MVP and Senior Architect at IKEA.">
    <meta name="keywords" content="Power BI, Microsoft Fabric, PBIR, DAX, TMDL, MVP, Data Analytics, DevOps">
    <meta name="author" content="Jihwan Kim">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-src 'self'">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta property="og:title" content="Jihwan Kim — Power BI & Fabric Technical Blog">
    <meta property="og:description" content="Deep technical writing on Power BI, PBIR, DAX, and Microsoft Fabric for expert developers.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://powerbimvp.com">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Jihwan Kim — Power BI & Fabric Technical Blog">
    <meta name="twitter:description" content="Deep technical writing on Power BI, PBIR, DAX, and Microsoft Fabric for expert developers.">
    <title>Jihwan Kim | Power BI & Microsoft Fabric Blog</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <a href="#main" class="skip-link">Skip to content</a>

    <header class="site-header" id="site-header"></header>

    <main class="main-content" id="main">
        <!-- Blog Intro -->
        <section class="blog-intro animate-in">
            <h1 class="blog-tagline">Deep dives into <span class="brand-powerbi">Power BI</span>, PBIR, DAX, and <span class="brand-microsoft">Microsoft</span> <span class="brand-fabric">Fabric</span></h1>
            <p class="blog-author-line">By <strong>Jihwan Kim</strong> &mdash; Microsoft MVP, Senior Architect at IKEA</p>
        </section>

        <!-- Tag Filter Bar -->
        <div class="tag-filter-bar animate-in">
            <button class="tag-pill active" data-tag="all">All</button>
            <button class="tag-pill" data-tag="Power BI">Power BI</button>
            <button class="tag-pill" data-tag="PBIR">PBIR</button>
            <button class="tag-pill" data-tag="DAX">DAX</button>
            <button class="tag-pill" data-tag="Fabric">Fabric</button>
            <button class="tag-pill" data-tag="DevOps">DevOps</button>
        </div>

        <!-- Posts Grid -->
        <div class="posts-grid" id="posts-container"></div>

        <!-- No Results -->
        <div class="no-results" id="no-results" style="display:none;">
            <div class="no-results-icon">
                <span class="material-symbols-outlined" style="font-size:48px;">search_off</span>
            </div>
            <h3>No posts found</h3>
            <p>Try a different search term or filter.</p>
        </div>

        <!-- Pagination -->
        <nav class="pagination" id="pagination" aria-label="Blog pagination"></nav>
    </main>

    <footer class="site-footer" id="site-footer"></footer>

    <script src="js/nav.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/blog-data.js"></script>
</body>
</html>
