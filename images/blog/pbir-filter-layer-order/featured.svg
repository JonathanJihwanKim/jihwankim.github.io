<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="warmGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="jsonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd93d"/>
      <stop offset="100%" style="stop-color:#ff9a3c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#skyGrad)"/>
  
  <!-- Cubist geometric background shapes -->
  <polygon points="0,0 400,0 300,200 0,150" fill="#1f4068" opacity="0.6"/>
  <polygon points="400,0 800,0 700,180 350,120" fill="#162447" opacity="0.5"/>
  <polygon points="800,0 1200,0 1200,200 900,150" fill="#1b1b2f" opacity="0.7"/>
  <polygon points="0,630 0,400 200,350 400,500 300,630" fill="#1f4068" opacity="0.5"/>
  <polygon points="900,630 1200,630 1200,380 1000,420" fill="#162447" opacity="0.6"/>
  <polygon points="0,630 300,630 400,500 200,480 0,550" fill="#0f3460" opacity="0.4"/>
  
  <!-- Left side: The "Click" world - fragmented, manual -->
  <g transform="translate(50, 100)">
    <!-- Fragmented cursor/hand shape -->
    <polygon points="80,80 140,50 180,110 160,190 100,170" fill="#e94560" opacity="0.9"/>
    <polygon points="140,50 220,20 250,80 180,110" fill="#ff6b6b" opacity="0.8"/>
    <polygon points="180,110 250,80 280,160 230,220 160,190" fill="#c73e5b" opacity="0.85"/>
    <polygon points="100,170 160,190 140,250 80,230" fill="#b8344f" opacity="0.75"/>
    
    <!-- Eye icons (filter visibility) -->
    <ellipse cx="120" cy="320" rx="45" ry="25" fill="none" stroke="#ff9a3c" stroke-width="4"/>
    <circle cx="120" cy="320" r="14" fill="#ffd93d"/>
    <circle cx="124" cy="316" r="4" fill="#1a1a2e"/>
    
    <ellipse cx="220" cy="380" rx="38" ry="22" fill="none" stroke="#ff9a3c" stroke-width="3" transform="rotate(-15, 220, 380)"/>
    <circle cx="220" cy="380" r="11" fill="#ffd93d"/>
    <circle cx="223" cy="377" r="3" fill="#1a1a2e"/>
    
    <ellipse cx="80" cy="430" rx="35" ry="20" fill="none" stroke="#ff9a3c" stroke-width="3" transform="rotate(10, 80, 430)"/>
    <circle cx="80" cy="430" r="10" fill="#ffd93d"/>
    
    <!-- Crossed out eyes (hidden filters) -->
    <g transform="translate(160, 480)">
      <ellipse cx="50" cy="0" rx="32" ry="18" fill="none" stroke="#666" stroke-width="3"/>
      <circle cx="50" cy="0" r="9" fill="#444"/>
      <line x1="15" y1="-22" x2="85" y2="22" stroke="#e94560" stroke-width="4"/>
    </g>
    
    <g transform="translate(30, 520)">
      <ellipse cx="40" cy="0" rx="28" ry="16" fill="none" stroke="#555" stroke-width="2"/>
      <circle cx="40" cy="0" r="7" fill="#444"/>
      <line x1="10" y1="-18" x2="70" y2="18" stroke="#e94560" stroke-width="3"/>
    </g>
  </g>
  
  <!-- Center: Transformation arrow -->
  <g transform="translate(350, 220)">
    <polygon points="0,100 100,50 100,75 250,75 250,50 350,100 250,150 250,125 100,125 100,150" 
             fill="url(#warmGrad)" opacity="0.95"/>
    <polygon points="120,85 220,85 220,115 120,115" fill="#fff" opacity="0.25"/>
    <polygon points="250,75 300,60 350,100 300,85 250,95" fill="#ff6b6b" opacity="0.7"/>
    <polygon points="250,125 300,140 350,100 300,115 250,105" fill="#c73e5b" opacity="0.7"/>
    <polygon points="0,100 50,70 100,50 80,90 30,100" fill="#ff8a80" opacity="0.5"/>
  </g>
  
  <!-- Right side: The "Code" world -->
  <g transform="translate(720, 40)">
    <!-- JSON brackets -->
    <text x="0" y="120" font-family="'Courier New', monospace" font-size="140" fill="url(#jsonGrad)" font-weight="bold" filter="url(#glow)">{</text>
    <text x="350" y="520" font-family="'Courier New', monospace" font-size="140" fill="url(#jsonGrad)" font-weight="bold" filter="url(#glow)">}</text>
    
    <!-- Code blocks -->
    <g transform="translate(90, 140)">
      <rect x="0" y="0" width="340" height="55" fill="#0f3460" rx="5"/>
      <rect x="5" y="5" width="330" height="45" fill="#1a1a2e" rx="3"/>
      <text x="15" y="35" font-family="'Courier New', monospace" font-size="15" fill="#00d9ff">"isHiddenInViewMode"</text>
      <text x="210" y="35" font-family="'Courier New', monospace" font-size="15" fill="#ff6b6b">: true</text>
      
      <rect x="25" y="75" width="320" height="55" fill="#0f3460" rx="5" transform="rotate(-2)"/>
      <rect x="30" y="80" width="310" height="45" fill="#1a1a2e" rx="3" transform="rotate(-2)"/>
      <text x="42" y="110" font-family="'Courier New', monospace" font-size="15" fill="#00d9ff" transform="rotate(-2)">"keepLayerOrder"</text>
      <text x="195" y="110" font-family="'Courier New', monospace" font-size="15" fill="#ff6b6b" transform="rotate(-2)">: true</text>
      
      <rect x="50" y="155" width="300" height="50" fill="#0f3460" rx="5" transform="rotate(1)"/>
      <rect x="55" y="160" width="290" height="40" fill="#1a1a2e" rx="3" transform="rotate(1)"/>
      <text x="68" y="186" font-family="'Courier New', monospace" font-size="13" fill="#ffd93d" transform="rotate(1)">"visualContainerObjects"</text>
      <text x="262" y="186" font-family="'Courier New', monospace" font-size="13" fill="#666" transform="rotate(1)">: {</text>
    </g>
    
    <!-- Git diff indicator -->
    <g transform="translate(100, 360)">
      <polygon points="0,0 20,0 20,70 0,70" fill="#4caf50"/>
      <text x="4" y="42" font-family="'Courier New', monospace" font-size="28" fill="#fff">+</text>
      <polygon points="28,8 220,8 220,58 28,58" fill="#1b4332" opacity="0.8"/>
      <polygon points="34,14 214,14 214,52 34,52" fill="#0d1f16"/>
      <text x="45" y="38" font-family="'Courier New', monospace" font-size="11" fill="#4caf50">"expr": { "Literal"...</text>
    </g>
    
    <!-- Layer indicators -->
    <g transform="translate(260, 380)">
      <rect x="0" y="0" width="90" height="30" fill="#e94560" opacity="0.85" rx="4"/>
      <rect x="18" y="38" width="90" height="30" fill="#ff9a3c" opacity="0.85" rx="4"/>
      <rect x="36" y="76" width="90" height="30" fill="#ffd93d" opacity="0.85" rx="4"/>
      <line x1="45" y1="30" x2="63" y2="38" stroke="#fff" stroke-width="1" opacity="0.4"/>
      <line x1="63" y1="68" x2="81" y2="76" stroke="#fff" stroke-width="1" opacity="0.4"/>
    </g>
  </g>
  
  <!-- Abstract developer figure -->
  <g transform="translate(450, 400)">
    <polygon points="50,0 100,25 85,100 35,90 20,40" fill="#ffb4a2" opacity="0.9"/>
    <polygon points="100,25 140,50 125,115 85,100" fill="#e5989b" opacity="0.85"/>
    <polygon points="20,40 50,0 5,25" fill="#ffcdb2" opacity="0.8"/>
    <polygon points="35,90 85,100 70,140 25,130" fill="#dda99b" opacity="0.7"/>
    
    <ellipse cx="65" cy="55" rx="15" ry="10" fill="#fff"/>
    <circle cx="72" cy="55" r="6" fill="#1a1a2e"/>
    <circle cx="74" cy="53" r="2" fill="#fff"/>
    
    <ellipse cx="110" cy="70" rx="10" ry="7" fill="#fff" opacity="0.8"/>
    <circle cx="114" cy="70" r="4" fill="#1a1a2e"/>
    
    <!-- Thinking lines -->
    <path d="M 120,40 Q 160,25 190,50 Q 220,75 260,60" stroke="#00d9ff" stroke-width="3" fill="none" opacity="0.7"/>
    <path d="M 130,65 Q 175,55 210,85 Q 240,100 280,90" stroke="#ffd93d" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M 125,85 Q 160,90 190,110" stroke="#ff6b6b" stroke-width="2" fill="none" opacity="0.5"/>
  </g>
  
  <!-- Decorative elements -->
  <polygon points="0,0 80,0 55,55 0,40" fill="#e94560" opacity="0.4"/>
  <polygon points="80,0 160,0 130,65 60,45" fill="#00d9ff" opacity="0.25"/>
  <polygon points="1150,0 1200,0 1200,80 1160,60" fill="#ffd93d" opacity="0.3"/>
  <polygon points="1080,0 1150,0 1160,60 1100,80 1050,40" fill="#e94560" opacity="0.25"/>
  
  <!-- Bottom decorative shapes -->
  <polygon points="0,580 150,560 200,630 0,630" fill="#e94560" opacity="0.6"/>
  <polygon points="150,560 300,540 350,600 200,630" fill="#ff9a3c" opacity="0.5"/>
  <polygon points="1000,600 1100,570 1200,590 1200,630 1050,630" fill="#00d9ff" opacity="0.5"/>
  <polygon points="900,630 1000,600 1050,630" fill="#ffd93d" opacity="0.4"/>
  
  <polygon points="1150,150 1200,120 1200,200 1170,190" fill="#e94560" opacity="0.35"/>
  <polygon points="1080,250 1140,220 1200,270 1180,320 1100,290" fill="#00d9ff" opacity="0.25"/>
  
  <!-- Floating abstract symbols -->
  <text x="300" y="120" font-family="'Courier New', monospace" font-size="50" fill="#ffd93d" opacity="0.2" transform="rotate(-12)">[</text>
  <text x="250" y="550" font-family="'Courier New', monospace" font-size="45" fill="#00d9ff" opacity="0.2" transform="rotate(8)">]</text>
  <text x="580" y="140" font-family="'Courier New', monospace" font-size="30" fill="#fff" opacity="0.1" transform="rotate(-5)">"</text>
  <text x="620" y="560" font-family="'Courier New', monospace" font-size="35" fill="#ff6b6b" opacity="0.15">:</text>
  
  <!-- Geometric accents -->
  <circle cx="180" cy="180" r="8" fill="#ffd93d" opacity="0.4"/>
  <circle cx="650" cy="100" r="6" fill="#00d9ff" opacity="0.5"/>
  <circle cx="400" cy="520" r="10" fill="#e94560" opacity="0.3"/>
  <rect x="550" y="480" width="15" height="15" fill="#ffd93d" opacity="0.3" transform="rotate(45, 557, 487)"/>
</svg>